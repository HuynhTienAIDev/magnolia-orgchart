// Duyệt orgchart, trả về map { "Tên người": depth (chỉ đếm cấp có người) }
function getOrgDepthMap() {
  const map = {};
  let personDepth = 0;
  function walk(node, depth) {
    if (!node) return;
    const name = (node.person || '').trim();
    const hasPerson = name && !name.startsWith('(');
    if (hasPerson) {
      map[name] = depth;
    }
    (node.reports || []).forEach(child => {
      const childHasPerson = (child.person || '').trim() && !(child.person || '').trim().startsWith('(');
      walk(child, childHasPerson ? depth + 1 : depth);
    });
  }
  if (appData.orgChart) walk(appData.orgChart, 1);
  return map;
}

// Duyệt orgchart, trả về map { "Tên người": ["Tên nhân viên 1", ...] } cho những ai có reports có người
function getOrgTeams() {
  const teams = {};
  function walk(node) {
    if (!node) return;
    const name = (node.person || '').trim();
    const reports = node.reports || [];
    // Tìm tất cả người trong reports (kể cả nested qua ô bộ phận trống)
    function collectPeopleBelow(n) {
      const result = [];
      (n.reports || []).forEach(child => {
        const cp = (child.person || '').trim();
        if (cp && !cp.startsWith('(')) result.push(cp);
        // Nếu ô bộ phận trống, đi sâu tiếp
        if (!cp || cp.startsWith('(')) result.push(...collectPeopleBelow(child));
      });
      return result;
    }
    if (name && !name.startsWith('(')) {
      const below = collectPeopleBelow(node);
      if (below.length > 0) teams[name] = below;
    }
    reports.forEach(child => walk(child));
  }
  if (appData.orgChart) walk(appData.orgChart);
  return teams;
}

function renderKpis() {
  const container = document.getElementById('kpiContent');
  const kpis = appData.kpis || [];
  const filterType = document.getElementById('kpiFilterType')?.value || '';

  // Parse checkbox filter
  const filterDepts = new Set();
  const filterPersons = new Set();
  document.querySelectorAll('#kpiFilterPanel input:checked').forEach(cb => {
    const v = cb.value;
    if (v.startsWith('dept:')) filterDepts.add(v.slice(5));
    else if (v.startsWith('person:')) filterPersons.add(v.slice(7));
  });
  const hasFilter = filterDepts.size > 0 || filterPersons.size > 0;

  // Update label
  const labelEl = document.getElementById('kpiFilterLabel');
  if (labelEl) {
    const count = filterDepts.size + filterPersons.size;
    labelEl.textContent = count === 0 ? 'Tất cả' : count + ' đã chọn';
  }

  // Populate filter panel
  const panel = document.getElementById('kpiFilterPanel');
  const kpiSig = kpis.map(d => d.department + ':' + d.members.map(m => m.person).join(',')).join('|');
  if (panel && panel.dataset.sig !== kpiSig) {
    panel.dataset.sig = kpiSig;
    let ph = '<div class="kpi-filter-item" onclick="document.querySelectorAll(\'#kpiFilterPanel input\').forEach(c=>c.checked=false);renderKpis();"><em>Bỏ chọn tất cả</em></div>';
    kpis.forEach(d => {
      ph += '<div class="kpi-filter-group">';
      ph += '<div class="kpi-filter-group-title">' + esc(d.department) + '</div>';
      ph += '<label class="kpi-filter-item dept-item"><input type="checkbox" value="dept:' + escAttr(d.department) + '" onchange="renderKpis()"> Toàn bộ phận ' + esc(d.department) + '</label>';
      d.members.forEach(m => {
        if (!m.person) return;
        ph += '<label class="kpi-filter-item"><input type="checkbox" value="person:' + escAttr(m.person) + '" onchange="renderKpis()"> ' + esc(m.person) + '</label>';
      });
      ph += '</div>';
    });
    panel.innerHTML = ph;
  }

  if (!kpis.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9733;</div><p>Chưa có dữ liệu KPIs</p></div>';
    return;
  }

  let html = '';
  kpis.forEach((dept, di) => {
    // Filter: nếu chọn dept hoặc person thuộc dept khác → ẩn
    if (hasFilter) {
      const deptMatch = filterDepts.has(dept.department);
      const hasMemberMatch = dept.members.some(m => filterPersons.has((m.person||'').trim()));
      if (!deptMatch && !hasMemberMatch) return;
    }

    html += `<div class="kpi-dept-card">`;
    html += `<div class="kpi-dept-header" oncontextmenu="showCtxMenu(event,[{label:'Xoá phòng ban',danger:true,action:'function(){deleteKpiDept(${di})}'}])">
      <h3 class="inline-edit" style="color:#fff" ondblclick="makeInlineEditable(this,'${escAttr(dept.department)}',v=>{appData.kpis[${di}].department=v;renderKpis();autoSave();})">${esc(dept.department)}</h3>
      <span style="font-size:0.75rem;opacity:0.8;">${dept.members.length} nhân sự</span>
    </div>`;

    // KPI chung phòng ban
    const deptItems = (dept.deptKpis || []).filter(k => !filterType || k.type === filterType);
    html += `<div class="kpi-dept-kpis-section">
      <div class="kpi-dept-kpis-title">KPIs chung phòng ban</div>`;
    if (deptItems.length) {
      html += `<table class="kpi-table">
        <thead><tr><th>Chỉ số</th><th>Loại</th><th>Mục tiêu</th><th></th></tr></thead>
        <tbody>`;
      deptItems.forEach(k => {
        const realIdx = (dept.deptKpis || []).indexOf(k);
        const typeCls = k.type === 'result' ? 'kpi-type-result' : 'kpi-type-execution';
        const typeLabel = k.type === 'result' ? 'Kết quả' : 'Thực thi';
        html += `<tr oncontextmenu="showCtxMenu(event,[{label:'Xoá KPI phòng ban',danger:true,action:'function(){deleteDeptKpiItem(${di},${realIdx})}'}])">
          <td><span class="inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.name)}',v=>{appData.kpis[${di}].deptKpis[${realIdx}].name=v;autoSave();})">${esc(k.name)}</span></td>
          <td><span class="kpi-type-badge ${typeCls}" style="cursor:pointer;" onclick="appData.kpis[${di}].deptKpis[${realIdx}].type=appData.kpis[${di}].deptKpis[${realIdx}].type==='result'?'execution':'result';renderKpis();autoSave();">${typeLabel}</span></td>
          <td><span class="kpi-target-val inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.target)}',v=>{appData.kpis[${di}].deptKpis[${realIdx}].target=v;autoSave();})">${esc(k.target)}</span></td>
        </tr>`;
      });
      html += `</tbody></table>`;
    } else {
      html += `<p style="font-size:0.78rem;color:var(--text-secondary);margin:4px 0;">Chưa có KPI chung</p>`;
    }
    html += `<button class="btn-sm btn-outline" style="margin-top:6px;" onclick="openAddDeptKpiItemModal(${di})">+ Thêm KPI phòng ban</button>
    </div>`;

    // Nhóm members theo team từ orgchart
    const orgTeams = getOrgTeams();
    const memberNames = dept.members.map(m => (m.person || '').trim());

    // Tìm các team leader trong dept này
    const teams = []; // [{leader: mi, members: [mi, ...]}]
    const assigned = new Set();

    dept.members.forEach((member, mi) => {
      const name = (member.person || '').trim();
      const subordinates = orgTeams[name] || [];
      // Chỉ tạo team nếu leader có nhân viên trong cùng dept
      const teamMembers = subordinates
        .map(sub => dept.members.findIndex(m => (m.person || '').trim() === sub))
        .filter(idx => idx >= 0);
      if (teamMembers.length > 0) {
        teams.push({ leader: mi, members: [mi, ...teamMembers] });
        assigned.add(mi);
        teamMembers.forEach(idx => assigned.add(idx));
      }
    });

    // Những người chưa thuộc team nào → nhóm "ungrouped"
    const ungrouped = dept.members.map((m, mi) => mi).filter(mi => !assigned.has(mi));

    // Apply person filter (multi-select)
    const personMatch = mi => {
      if (!hasFilter) return true;
      if (filterDepts.has(dept.department) && filterPersons.size === 0) return true;
      return filterPersons.has((dept.members[mi]?.person || '').trim());
    };

    // Nếu không có team nào → hiển thị phẳng
    const hasTeams = teams.length > 0;

    // Render function cho 1 nhóm người
    const renderGroup = (indices, title) => {
      const filtered = indices.filter(personMatch);
      if (!filtered.length) return;
      const showTitle = title && hasTeams;
      html += `<div class="kpi-level-section">`;
      if (showTitle) {
        html += `<div class="kpi-level-header">${esc(title)} <span style="font-size:0.72rem;opacity:0.7;">(${filtered.length} người)</span></div>`;
      }
      html += `<div class="kpi-level-grid" data-count="${Math.min(filtered.length, 4)}">`;

      indices.forEach(mi => {
        const member = dept.members[mi];
        if (!member) return;
        const initials = (member.person || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const filtered = (member.items || []).filter(k => !filterType || k.type === filterType);

        html += `<div class="kpi-person-section" oncontextmenu="showCtxMenu(event,[{label:'Xoá nhân sự',danger:true,action:'function(){deleteKpiMember(${di},${mi})}'}])">
          <div class="kpi-person-header">
            <div class="kpi-person-avatar">${esc(initials)}</div>
            <div>
              <div class="kpi-person-name inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(member.person)}',v=>{appData.kpis[${di}].members[${mi}].person=v;renderKpis();autoSave();})">${esc(member.person)}</div>
              <div class="kpi-person-role inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(member.role||'')}',v=>{appData.kpis[${di}].members[${mi}].role=v;renderKpis();autoSave();})">${esc(member.role || 'Nhấn đúp để thêm vai trò')}</div>
            </div>
          </div>`;

        if (filtered.length) {
          html += `<table class="kpi-table">
            <thead><tr><th>Chỉ số</th><th>Loại</th><th>Mục tiêu</th><th></th></tr></thead>
            <tbody>`;
          filtered.forEach((k, ki) => {
            const realIdx = member.items.indexOf(k);
            const typeCls = k.type === 'result' ? 'kpi-type-result' : 'kpi-type-execution';
            const typeLabel = k.type === 'result' ? 'Kết quả' : 'Thực thi';
            html += `<tr oncontextmenu="showCtxMenu(event,[{label:'Xoá KPI',danger:true,action:'function(){deleteKpiItem(${di},${mi},${realIdx})}'}])">
              <td><span class="inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.name)}',v=>{appData.kpis[${di}].members[${mi}].items[${realIdx}].name=v;autoSave();})">${esc(k.name)}</span></td>
              <td><span class="kpi-type-badge ${typeCls}" style="cursor:pointer;" onclick="appData.kpis[${di}].members[${mi}].items[${realIdx}].type=appData.kpis[${di}].members[${mi}].items[${realIdx}].type==='result'?'execution':'result';renderKpis();autoSave();">${typeLabel}</span></td>
              <td><span class="kpi-target-val inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.target)}',v=>{appData.kpis[${di}].members[${mi}].items[${realIdx}].target=v;autoSave();})">${esc(k.target)}</span></td>
            </tr>`;
          });
          html += `</tbody></table>`;
        } else {
          html += `<p style="font-size:0.78rem;color:var(--text-secondary);">Không có KPI ${filterType === 'result' ? 'kết quả' : filterType === 'execution' ? 'thực thi' : ''}</p>`;
        }

        html += `<div style="margin-top:8px;display:flex;gap:6px;">
          <button class="btn-sm btn-outline" onclick="openAddKpiItemModal(${di},${mi})">+ Thêm KPI</button>
        </div></div>`;
      });

      html += `</div></div>`;
    };

    // Render: teams ngang nhau, mỗi team 1 cột chứa leader + members
    if (hasTeams) {
      const visibleTeams = teams.filter(t => t.members.some(personMatch));
      html += `<div class="kpi-teams-row" style="display:grid;grid-template-columns:repeat(${Math.min(visibleTeams.length, 4)},1fr);gap:0;">`;
      visibleTeams.forEach(team => {
        const visibleMembers = team.members.filter(personMatch);
        const leaderName = (dept.members[team.leader]?.person || '').trim();
        const teamTitle = dept.members[team.leader]?.role ? `Team ${leaderName.split(' ').pop()}` : leaderName;
        html += `<div class="kpi-team-col" style="border-right:2px solid var(--border);">`;
        html += `<div class="kpi-level-header">${esc(teamTitle)} <span style="font-size:0.72rem;opacity:0.7;">(${visibleMembers.length} người)</span></div>`;
        visibleMembers.forEach(mi => {
          const member = dept.members[mi];
          if (!member) return;
          const initials = (member.person || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
          const filtered = (member.items || []).filter(k => !filterType || k.type === filterType);

          html += `<div class="kpi-person-section" oncontextmenu="showCtxMenu(event,[{label:'Xoá nhân sự',danger:true,action:'function(){deleteKpiMember(${di},${mi})}'}])">
            <div class="kpi-person-header">
              <div class="kpi-person-avatar">${esc(initials)}</div>
              <div>
                <div class="kpi-person-name inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(member.person)}',v=>{appData.kpis[${di}].members[${mi}].person=v;renderKpis();autoSave();})">${esc(member.person)}</div>
                <div class="kpi-person-role inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(member.role||'')}',v=>{appData.kpis[${di}].members[${mi}].role=v;renderKpis();autoSave();})">${esc(member.role || '')}</div>
              </div>
            </div>`;

          if (filtered.length) {
            html += `<table class="kpi-table">
              <thead><tr><th>Chỉ số</th><th>Loại</th><th>Mục tiêu</th><th></th></tr></thead>
              <tbody>`;
            filtered.forEach(k => {
              const realIdx = member.items.indexOf(k);
              const typeCls = k.type === 'result' ? 'kpi-type-result' : 'kpi-type-execution';
              const typeLabel = k.type === 'result' ? 'Kết quả' : 'Thực thi';
              html += `<tr oncontextmenu="showCtxMenu(event,[{label:'Xoá KPI',danger:true,action:'function(){deleteKpiItem(${di},${mi},${realIdx})}'}])">
                <td><span class="inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.name)}',v=>{appData.kpis[${di}].members[${mi}].items[${realIdx}].name=v;autoSave();})">${esc(k.name)}</span></td>
                <td><span class="kpi-type-badge ${typeCls}" style="cursor:pointer;" onclick="appData.kpis[${di}].members[${mi}].items[${realIdx}].type=appData.kpis[${di}].members[${mi}].items[${realIdx}].type==='result'?'execution':'result';renderKpis();autoSave();">${typeLabel}</span></td>
                <td><span class="kpi-target-val inline-edit" ondblclick="makeInlineEditable(this,'${escAttr(k.target)}',v=>{appData.kpis[${di}].members[${mi}].items[${realIdx}].target=v;autoSave();})">${esc(k.target)}</span></td>
              </tr>`;
            });
            html += `</tbody></table>`;
          }

          html += `<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn-sm btn-outline" onclick="openAddKpiItemModal(${di},${mi})">+ Thêm KPI</button>
          </div></div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;

      // Render ungrouped (nếu có)
      if (ungrouped.length) renderGroup(ungrouped, 'Khác');
    } else {
      // Không có team → hiển thị phẳng ngang nhau
      renderGroup(dept.members.map((m, mi) => mi), null);
    }

    html += `<div style="padding:10px 18px;border-top:1px solid var(--border);">
      <button class="btn-sm btn-outline" onclick="openAddKpiMemberModal(${di})">+ Thêm nhân sự</button>
    </div></div>`;
  });

  container.innerHTML = html;
}

function updateJSONEditor() {
  document.getElementById('jsonEditor').value = JSON.stringify(appData, null, 2);
  updateJSONPreview();
}

function applyJSON() {
  const text = document.getElementById('jsonEditor').value;
  try {
    appData = JSON.parse(text);
    renderAll();
    autoSave();
    showToast('Đã áp dụng JSON thành công!');
  } catch (e) {
    showToast('Lỗi JSON: ' + e.message);
  }
}

function formatJSON() {
  try {
    const obj = JSON.parse(document.getElementById('jsonEditor').value);
    document.getElementById('jsonEditor').value = JSON.stringify(obj, null, 2);
  } catch (e) {
    showToast('JSON không hợp lệ: ' + e.message);
  }
}

    <div style="margin-bottom:8px;"><strong>Roles:</strong> ${(appData.roles || []).length}</div>
    <div style="margin-bottom:8px;"><strong>RACI:</strong> ${(appData.raci?.processes || []).length} processes x ${(appData.raci?.roles || []).length} roles</div>
  `;
}

// ═══════════════════════════
// ██ MODALS
// ═══════════════════════════
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function openNodeDetailModal(node, path) {
  const initials = (node.person || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const previewHTML = node.photo
    ? `<img id="md_photo_preview" src="${node.photo}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border);" />`
    : `<div id="md_photo_preview" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c4dff);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.3rem;color:#fff;border:2px solid var(--border);">${esc(initials)}</div>`;

  openModal(`
    <h2>${esc(node.name || 'Node')}</h2>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
      ${previewHTML}
      <div>
        <button class="btn-sm" onclick="document.getElementById('md_photo_input').click()">Chọn ảnh</button>
        ${node.photo ? '<button class="btn-sm btn-danger" style="margin-left:6px;" onclick="removeNodePhoto(\'' + escAttr(path) + '\')">Xoá ảnh</button>' : ''}
        <input type="file" id="md_photo_input" accept="image/*" style="display:none;" onchange="previewNodePhoto(event, '${escAttr(path)}')" />
        <p style="font-size:0.72rem;color:var(--text-secondary);margin-top:4px;">Nhấn chọn ảnh hoặc kéo thả</p>
      </div>
    </div>
    <div class="form-group"><label>Tên</label><input id="md_name" value="${escAttr(node.name || '')}" /></div>
    <div class="form-group"><label>Chức danh</label><input id="md_title" value="${escAttr(node.title || '')}" /></div>
    <div class="form-group"><label>Người phụ trách</label><input id="md_person" value="${escAttr(node.person || '')}" /></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="saveNodeDetail('${escAttr(path)}')">Lưu</button>
    </div>
  `);
}

// Temp storage for photo being uploaded
let _pendingPhoto = null;

function previewNodePhoto(event, path) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) {
    showToast('Ảnh quá lớn! Tối đa 500KB.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    _pendingPhoto = e.target.result;
    const preview = document.getElementById('md_photo_preview');
    if (preview.tagName === 'IMG') {
      preview.src = _pendingPhoto;
    } else {
      preview.outerHTML = `<img id="md_photo_preview" src="${_pendingPhoto}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border);" />`;
    }
  };
  reader.readAsDataURL(file);
}

function removeNodePhoto(path) {
  const node = getNodeByPath(path);
  if (node) {
    delete node.photo;
    _pendingPhoto = null;
    renderAll();
    autoSave();
    closeModal();
    showToast('Đã xoá ảnh!');
  }
}

function saveNodeDetail(path) {
  const node = getNodeByPath(path);
  if (!node) return;
  node.name = document.getElementById('md_name').value;
  node.title = document.getElementById('md_title').value;
  node.person = document.getElementById('md_person').value;
  if (_pendingPhoto) {
    node.photo = _pendingPhoto;
    _pendingPhoto = null;
  }
  closeModal();
  renderAll();
  autoSave();
}

function getNodeByPath(path) {
  const parts = path.split('.');
  let node = appData.orgChart;
  for (let i = 1; i < parts.length; i++) {
    node = (node.reports || [])[parseInt(parts[i])];
    if (!node) return null;
  }
  return node;
}

function openAddNodeModal() {
  let options = '';
  const buildOpts = (node, path, prefix = '') => {
    options += `<option value="${escAttr(path)}">${prefix}${esc(node.name || node.title || 'Node')}</option>`;
    (node.reports || []).forEach((r, i) => buildOpts(r, path + '.' + i, prefix + '  '));
  };
  if (appData.orgChart) buildOpts(appData.orgChart, 'root');

  _pendingPhoto = null;
  openModal(`
    <h2>Thêm đơn vị mới</h2>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
      <div id="an_photo_preview" style="width:60px;height:60px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--text-secondary);border:2px dashed var(--border);">?</div>
      <div>
        <button class="btn-sm" onclick="document.getElementById('an_photo_input').click()">Chọn ảnh</button>
        <input type="file" id="an_photo_input" accept="image/*" style="display:none;" onchange="previewAddNodePhoto(event)" />
        <p style="font-size:0.72rem;color:var(--text-secondary);margin-top:4px;">Tối đa 500KB</p>
      </div>
    </div>
    <div class="form-group"><label>Đơn vị cha</label><select id="an_parent">${options}</select></div>
    <div class="form-group"><label>Tên</label><input id="an_name" placeholder="VD: Team AI" /></div>
    <div class="form-group"><label>Chức danh</label><input id="an_title" placeholder="VD: AI Lead" /></div>
    <div class="form-group"><label>Người phụ trách</label><input id="an_person" placeholder="VD: Nguyễn Văn A" /></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="addOrgNode()">Thêm</button>
    </div>
  `);
}

function previewAddNodePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) { showToast('Ảnh quá lớn! Tối đa 500KB.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    _pendingPhoto = e.target.result;
    document.getElementById('an_photo_preview').outerHTML = `<img id="an_photo_preview" src="${_pendingPhoto}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--border);" />`;
  };
  reader.readAsDataURL(file);
}

function addOrgNode() {
  const parent = getNodeByPath(document.getElementById('an_parent').value);
  if (!parent) return;
  if (!parent.reports) parent.reports = [];
  const newNode = {
    name: document.getElementById('an_name').value || 'Đơn vị mới',
    title: document.getElementById('an_title').value || '',
    person: document.getElementById('an_person').value || '',
    reports: []
  };
  if (_pendingPhoto) { newNode.photo = _pendingPhoto; _pendingPhoto = null; }
  parent.reports.push(newNode);
  closeModal();
  renderAll();
  autoSave();
  showToast('Đã thêm đơn vị mới!');
}

function deleteOrgNode(path) {
  if (path === 'root') { showToast('Không thể xoá đơn vị gốc!'); return; }
  const parts = path.split('.');
  const idx = parseInt(parts.pop());
  const parentPath = parts.join('.');
  const parent = getNodeByPath(parentPath);
  if (parent && parent.reports) {
    parent.reports.splice(idx, 1);
    renderAll();
    autoSave();
    showToast('Đã xoá đơn vị!');
  }
}

function openAddRoleModal() {
  openModal(`
    <h2>Thêm vai trò mới</h2>
    <div class="form-group"><label>Vai trò</label><input id="ar_role" placeholder="VD: HR Manager" /></div>
    <div class="form-group"><label>Phòng ban</label><input id="ar_dept" placeholder="VD: Nhân sự" /></div>
    <div class="form-group"><label>Người phụ trách</label><input id="ar_person" placeholder="VD: Nguyễn Văn B" /></div>
    <div class="form-group"><label>Nhiệm vụ (mỗi dòng 1 nhiệm vụ)</label>
      <textarea id="ar_resp" class="json-editor" style="min-height:100px;" placeholder="Nhiệm vụ 1\nNhiệm vụ 2\nNhiệm vụ 3"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="addRole()">Thêm</button>
    </div>
  `);
}

function addRole() {
  if (!appData.roles) appData.roles = [];
  appData.roles.push({
    role: document.getElementById('ar_role').value || 'New Role',
    department: document.getElementById('ar_dept').value || '',
    person: document.getElementById('ar_person').value || '',
    responsibilities: document.getElementById('ar_resp').value.split('\n').map(s => s.trim()).filter(Boolean)
  });
  closeModal();
  renderAll();
  autoSave();
  showToast('Đã thêm vai trò!');
}

function openEditRoleModal(idx) {
  const r = appData.roles[idx];
  if (!r) return;
  openModal(`
    <h2>Sửa vai trò: ${esc(r.role)}</h2>
    <div class="form-group"><label>Vai trò</label><input id="er_role" value="${escAttr(r.role)}" /></div>
    <div class="form-group"><label>Phòng ban</label><input id="er_dept" value="${escAttr(r.department || '')}" /></div>
    <div class="form-group"><label>Người phụ trách</label><input id="er_person" value="${escAttr(r.person || '')}" /></div>
    <div class="form-group"><label>Nhiệm vụ (mỗi dòng 1 nhiệm vụ)</label>
      <textarea id="er_resp" class="json-editor" style="min-height:100px;">${esc((r.responsibilities || []).join('\n'))}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="saveRole(${idx})">Lưu</button>
    </div>
  `);
}

function saveRole(idx) {
  appData.roles[idx] = {
    role: document.getElementById('er_role').value,
    department: document.getElementById('er_dept').value,
    person: document.getElementById('er_person').value,
    responsibilities: document.getElementById('er_resp').value.split('\n').map(s => s.trim()).filter(Boolean)
  };
  closeModal();
  renderAll();
  autoSave();
}

function deleteRole(idx) {
  appData.roles.splice(idx, 1);
  renderAll();
  autoSave();
  showToast('Đã xoá vai trò!');
}

function openAddProcessModal() {
  openModal(`
    <h2>Thêm quy trình RACI</h2>
    <div class="form-group"><label>Tên quy trình</label><input id="ap_name" placeholder="VD: Phê duyệt ngân sách" /></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="addProcess()">Thêm</button>
    </div>
  `);
}

function addProcess() {
  const name = document.getElementById('ap_name').value.trim();
  if (!name) return;
  if (!appData.raci) appData.raci = { processes: [], roles: [], matrix: {} };
  appData.raci.processes.push(name);
  appData.raci.matrix[name] = {};
  closeModal();
  renderRaci();
  autoSave();
  showToast('Đã thêm quy trình!');
}

function openAddRaciRoleModal() {
  openModal(`
    <h2>Thêm vai trò RACI</h2>
    <div class="form-group"><label>Tên vai trò</label><input id="arr_name" placeholder="VD: QA Lead" /></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Huỷ</button>
      <button onclick="addRaciRole()">Thêm</button>
    </div>
  `);
}

function addRaciRole() {
  const name = document.getElementById('arr_name').value.trim();
  if (!name) return;
  if (!appData.raci) appData.raci = { processes: [], roles: [], matrix: {} };
  appData.raci.roles.push(name);
  closeModal();
  renderRaci();
  autoSave();
  showToast('Đã thêm vai trò RACI!');
}

function openInfoModal(title, html) {
  openModal(`<h2>${esc(title)}</h2><div>${html}</div><div class="form-actions"><button onclick="closeModal()">Đóng</button></div>`);
}

// ═══════════════════════════
// ██ IMPORT / EXPORT / SAVE
// ═══════════════════════════
function exportJSON() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `magnolia-orgsuit-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Đã xuất JSON!');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      appData = JSON.parse(e.target.result);
      renderAll();
      autoSave();
      showToast('Đã nhập thành công!');
    } catch (err) {
      showToast('Lỗi đọc file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function saveToLocal() {
  localStorage.setItem('magnolia_orgsuit_view_data', JSON.stringify(appData));
  showToast('Đã lưu vào LocalStorage!');
}

function autoSave() {
  localStorage.setItem('magnolia_orgsuit_view_data', JSON.stringify(appData));
  updateJSONEditor();
}

// ═══════════════════════════
// ██ UTILS
// ═══════════════════════════
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ─── KEYBOARD SHORTCUT ───
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveToLocal();
  }
});

// ─── BOOT ───
init();
</script>
